<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AxyStore</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<header>
<button class="logo" onclick="showPage('products')">Axys <br> Store</button>
  <input type="text" id="search" placeholder="Search...">

  <div class="right">
    <button onclick="showPage('cart')"><img src="img/shopping-bag.png" id="catricon"> (<span id="cartCount">0</span>)</button>
  </div>
</header>
<!-- PRODUCTS PAGE -->
<div id="productsPage">

  <div class="top-bar">
    <span id="count"></span>

    <select id="sort" onchange="loadProducts()">
      <option value="">Sort</option>
      <option value="low">Price Low</option>
      <option value="high">Price High</option>
    </select>
  </div>

  <div class="layout">

    <aside>
      <h3>Categories</h3>
      <button onclick="filter('all')">All</button>
      <button onclick="filter('rings')">Rings</button>
      <button onclick="filter('necklace')">Necklace</button>
      <button onclick="filter('bracelet')">Bracelet</button>
      <button onclick="filter('sets')">Sets</button>
      <button onclick="filter('couples')">Couples</button>
      <br><br>
      <button onclick="reset()">Reset</button>
    </aside>

    <div class="products" id="products"></div>

  </div>
</div>

<!-- PRODUCT DETAILS -->
<div id="productPage" style="display:none">

  <button onclick="showPage('products')">← Back</button>

  <div class="product-page">

    <div class="images">
      <img id="mainImg">
      <div id="thumbs"></div>
    </div>

    <div class="info">
      <h2 id="name"></h2>
      <p id="price"></p>

      <input type="number" id="qty" value="1" min="1">

      <button onclick="addToCart()">Add To Cart</button>
      <button onclick="buyNow()">Buy Now</button>

      <p id="desc"></p>
    </div>

  </div>
</div>

<!-- CART PAGE -->
<div id="cartPage" style="display:none">

  <h2>Your Cart</h2>
  <div id="cartItems"></div>

  <h3>Total: <span id="total"></span> EGP</h3>

  <button onclick="showPage('checkout')">Checkout</button>

</div>

<!-- CHECKOUT -->
<div id="checkoutPage" style="display:none">

  <h2>Checkout</h2>

  <input id="custName" placeholder="Your Name"><br>
  <input id="custPhone" placeholder="Phone"><br>
  <input id="custAddress" placeholder="Address"><br>

  <button onclick="sendWhatsApp()">Send Order WhatsApp</button>

</div>

 
<!-- REVIEWS (FIXED OUTSIDE LOGIN) -->
<div id="reviewsPage">

<section class="reviews">
  <h3>Customer Reviews</h3>

  <div class="slider">

    <div class="review">
      <img src="https://i.pravatar.cc/80?img=1">
      <h4>Ahmed Ali</h4>
      <p>المنتج خامته تحفة جدًا </p>
    </div>

    <div class="review">
      <img src="https://i.pravatar.cc/80?img=2">
      <h4>Mohamed Hassan</h4>
      <p>التوصيل سريع والتعامل محترم ❤️</p>
    </div>

    <div class="review">
      <img src="https://i.pravatar.cc/80?img=3">
      <h4>Sara Mohamed</h4>
      <p>أحسن متجر اشتريت منه </p>
    </div>

  </div>
</section>

</div>


<!-- ================= FOOTER ================= -->
<footer style="background:#000; color:#aaa; padding:40px 0; margin-top:50px; border-top:1px solid #222; text-align:center;">

  <!-- Logo -->
  <div style="margin-bottom:20px;">
    <img src="img/LOGO4.png" alt="Logo" style="width:90px; opacity:.9; transition:.3s;">
  </div>

<!-- Social Icons Clean Version -->
<div style="display:flex; justify-content:center; gap:30px; margin-bottom:25px;">

  <!-- Instagram -->
  <a href="https://www.instagram.com/axys_store/" target="_blank">
    <img src="img/instagram.png" alt="instagram"
      style="width:28px; opacity:.7; transition:.3s;"
      onmouseover="this.style.opacity='1';this.style.transform='scale(1.2)'"
      onmouseout="this.style.opacity='.7';this.style.transform='scale(1)'">
  </a>

  <!-- WhatsApp -->
  <a href="https://wa.me/qr/LW6ZS5UU7HJZG1" target="_blank">
    <img src="img/apple.png" alt="whatsapp"
      style="width:28px; opacity:.7; transition:.3s;"
      onmouseover="this.style.opacity='1';this.style.transform='scale(1.2)'"
      onmouseout="this.style.opacity='.7';this.style.transform='scale(1)'">
  </a>

  <!-- TikTok -->
  <a href="https://tiktok.com/@axys_store" target="_blank">
    <img src="img/social-media.png" alt="tiktok"
      style="width:28px; opacity:.7; transition:.3s;"
      onmouseover="this.style.opacity='1';this.style.transform='scale(1.2)'"
      onmouseout="this.style.opacity='.7';this.style.transform='scale(1)'">
  </a>

  <!-- Call / Support -->
  <a href="tel:01102579732">
    <img src="img/contact-mail.png" alt="support"
      style="width:28px; opacity:.7; transition:.3s;"
      onmouseover="this.style.opacity='1';this.style.transform='scale(1.2)'"
      onmouseout="this.style.opacity='.7';this.style.transform='scale(1)'">
  </a>

</div>
  <!-- Line -->
  <div style="width:60%; margin:15px auto; border-top:1px solid #333;"></div>

  <!-- Powered By -->
  <p style="font-size:14px; color:#666;">
    Powered By 
    <a href="https://mhty664.github.io/designer-After-12/" target="_blank"
       style="color:#fff; text-decoration:none;"
       onmouseover="this.style.textDecoration='underline'"
       onmouseout="this.style.textDecoration='none'">
       designer after 12
    </a>
  </p>

</footer>

<!-- Font Awesome Icons -->
<script src="https://kit.fontawesome.com/your-kit-id.js" crossorigin="anonymous"></script>

<script src="script.js"></script>
</body>
</html>
